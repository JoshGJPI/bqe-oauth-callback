<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BQE OAuth Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      max-width: 480px;
      width: 90%;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }
    p {
      margin: 0;
      opacity: 0.9;
    }
    .error {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
    }
    /* Manual code display — shown when opener is unavailable */
    .code-block {
      display: block;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      background: rgba(0, 0, 0, 0.35);
      padding: 0.9rem 1.1rem;
      border-radius: 8px;
      word-break: break-all;
      margin: 1.2rem 0 0.5rem;
      cursor: pointer;
      user-select: all;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.15s;
    }
    .code-block:hover { background: rgba(0,0,0,0.5); }
    .copy-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.35); }
    .hint {
      font-size: 0.82rem;
      opacity: 0.75;
      margin-top: 1rem !important;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Connecting to BQE CORE...</h1>
    <p id="status">Please wait while we complete the authentication.</p>
  </div>

  <script>
    (function() {
      const statusEl  = document.getElementById('status');
      const titleEl   = document.getElementById('title');
      const spinnerEl = document.getElementById('spinner');
      const container = document.querySelector('.container');

      console.log('OAuth callback URL:', window.location.href);

      try {
        const params           = new URLSearchParams(window.location.search);
        const code             = params.get('code');
        const error            = params.get('error');
        const errorDescription = params.get('error_description');

        // ── Error from BQE ─────────────────────────────────────
        if (error) {
          spinnerEl.style.display = 'none';
          statusEl.innerHTML = '<div class="error">Authentication failed: ' + (errorDescription || error) + '</div>';

          if (window.opener) {
            window.opener.postMessage({
              type: 'bqe-oauth-error',
              error: error,
              description: errorDescription
            }, '*');
          }
          setTimeout(() => window.close(), 3000);
          return;
        }

        // ── No code received ───────────────────────────────────
        if (!code) {
          spinnerEl.style.display = 'none';
          statusEl.innerHTML = '<div class="error">No authorization code received.</div>';
          setTimeout(() => window.close(), 3000);
          return;
        }

        // ── Success ────────────────────────────────────────────
        if (window.opener) {
          // Automatic path: plugin iframe is the opener — send code via postMessage
          window.opener.postMessage({ type: 'bqe-oauth-callback', code: code }, '*');
          spinnerEl.style.display = 'none';
          titleEl.textContent = 'Connected!';
          statusEl.textContent = 'Authentication successful. Closing window…';
          setTimeout(() => window.close(), 1000);
        } else {
          // Manual path: opened in system browser — display the code for copy-paste
          spinnerEl.style.display = 'none';
          titleEl.textContent = 'One more step';
          statusEl.textContent = 'Copy the code below and paste it into LogSeq:';

          var pre = document.createElement('pre');
          pre.className = 'code-block';
          pre.title = 'Click to select';
          pre.textContent = code;
          pre.addEventListener('click', function() { selectAll(pre); });
          container.appendChild(pre);

          var copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.textContent = 'Copy to clipboard';
          copyBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(code).then(function() {
              copyBtn.textContent = '✓ Copied!';
              setTimeout(function() { copyBtn.textContent = 'Copy to clipboard'; }, 2000);
            }).catch(function() {
              selectAll(pre);
            });
          });
          container.appendChild(copyBtn);

          var hint = document.createElement('p');
          hint.className = 'hint';
          hint.textContent = 'Paste this code into the "Authorization code" field in the LogSeq BQE plugin, then click Submit.';
          container.appendChild(hint);
        }
      } catch (err) {
        console.error('OAuth callback error:', err);
        statusEl.innerHTML = '<div class="error">An error occurred: ' + err.message + '</div>';
      }

      function selectAll(el) {
        var range = document.createRange();
        range.selectNodeContents(el);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    })();
  </script>
</body>
</html>
